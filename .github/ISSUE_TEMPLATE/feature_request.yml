name: Feature request
description: Suggest an improvement or new capability for AI Todo
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape AI Todo.

        Before you start, please search [existing issues](https://github.com/MaimoryLab/AI-Todo/issues?q=is%3Aissue) so we can avoid duplicates.

        The most useful feature requests describe the user problem before the implementation. As our contributing guide puts it: **"I couldn't X because Y" beats "please add X."** Lead with the problem so we can find the best solution together.

        Please do not paste private conversation transcripts, cookies, access tokens, API keys, or other sensitive content.

  - type: textarea
    id: problem
    attributes:
      label: What user problem are you trying to solve?
      description: Describe the problem or motivation first, not the implementation. What were you trying to do, and what got in the way?
      placeholder: |
        "I couldn't X because Y."

        Example: I couldn't tell which agent sessions still had unfinished work because the todo list mixes every source together with no way to focus on one.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: If you have one in mind, describe what you'd like to happen. It's fine to leave this open-ended if you only have the problem.
      placeholder: Describe the behavior, UI, or capability you'd expect.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you tried, other approaches you weighed, or why existing functionality doesn't cover this.
      placeholder: e.g. I tried filtering by status, but that doesn't separate todos by source app.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: |
        Which area does this touch? See the PRD for the v1 scope and Non-Goals.
        Note that cloud sync, team workspaces, proactive notifications, and working external-tool integrations (Slack, Discord, Telegram, Feishu) are Non-Goals for v1.
      options:
        - v1 core (scanner / extractor / local database / local web UI / manual cleanup)
        - Connector interface (generic contract for future external integrations)
        - i18n / localization (externalized UI strings, language readiness)
        - Docs (README, FEATURES, ARCHITECTURE, RULES, ROADMAP, templates)
        - Other / not sure
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a pull request to implement this feature.
          required: false
