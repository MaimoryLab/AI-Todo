name: Bug report
description: Report a problem so we can reproduce and fix it
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug for AI Todo.

        Before you start, please search the existing issues to avoid duplicates.

        **Do not paste secrets.** Never include full private conversation transcripts, cookies, access tokens, API keys, or any sensitive page content. Redact anything you are unsure about before submitting.

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Find it in `package.json` (the `version` field) or use a commit hash.
      placeholder: 0.9.24 / commit d8389f2
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      description: How did you install or run AI Todo?
      options:
        - npm
        - From source
        - Browser extension
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version (must be >=20), and browser version if relevant.
      placeholder: macOS 15 / Node 20.11.0 / Chrome 126
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source involved
      description: Which source or surface is affected?
      options:
        - Codex
        - Claude Code
        - Browser AI site
        - Viewer workbench
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal, ordered list of steps that triggers the bug.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Click `...`
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What actually happened? Include any error message text.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / diagnostics
      description: Paste relevant console output, stack traces, or diagnostics. Remove any sensitive content first.
      render: shell

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm this report does not contain any sensitive information (private transcripts, cookies, tokens, or API keys).
          required: true
