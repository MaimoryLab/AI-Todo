name: "Translation / localization"
description: Report missing, incorrect, or hardcoded copy in a translation or localization of AI Todo.
title: "[i18n] "
labels: [i18n, documentation]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make AI Todo readable in more languages!

        English is the default language for the README, repository metadata, issue templates, and the default UI. This form is for reporting copy that is missing a translation, translated incorrectly, or still hardcoded so it cannot be localized at all.

        Please do not paste secrets, tokens, API keys, or private conversation content. Localization issues only need the user-facing strings, not your data.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Where did you see the problem?
      options:
        - Viewer UI (local web app)
        - Browser extension
        - Website
        - Docs
        - README
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language
      description: The language code or name this report is about (BCP 47 style when possible).
      placeholder: en / zh-CN / ja / pt-BR
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Missing or incorrect copy
      description: |
        Describe what is wrong and where to find it. Helpful details:
        - Which screen, page, button, label, status, empty state, or error message.
        - Whether the string is untranslated, mistranslated, or still hardcoded (not loaded from localization resources).
        - The exact source text and, if relevant, what it currently shows in your language.
      placeholder: |
        On the Viewer todo list, the status filter still shows the raw enum value "agent_blocked" instead of a localized label. In zh-CN it appears in English rather than translated, and it looks like the label is hardcoded in the component rather than read from the i18n resources.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
      description: Propose the corrected or translated text. Keep displayed labels separate from stored enum values (for example, store `agent_blocked`, display "Agent blocked").
      placeholder: |
        Display label for status `agent_blocked`:
        - en: "Agent blocked"
        - zh-CN: "智能体受阻"
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request with this translation or fix.
          required: false
