version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # tsdown >= 0.21 breaks `npm run build` on Node 20 (rolldown/tsdown:
      # "Failed to import module 'unrun'"). We still support Node >=20, so
      # hold tsdown at 0.20.x until upstream restores Node 20 support, then
      # remove this ignore. 0.20.x patches and all other deps still update.
      - dependency-name: "tsdown"
        versions: [">=0.21.0"]

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
      - website
    commit-message:
      prefix: deps(website)
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci(deps)
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
